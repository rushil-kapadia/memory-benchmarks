# Azure OpenAI LLM + SageMaker embeddings (Qwen 600M)
#
# This matches the Mem0 production setup:
#   - LLM: Azure OpenAI (gpt-5) for fact extraction
#   - Embeddings: SageMaker TEI (Qwen3-Embedding-0.6B, 768 dims)
#
# Required env vars:
#   AZURE_OPENAI_API_KEY, AZURE_OPENAI_ENDPOINT
#   AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY, AWS_REGION
#
# Usage:
#   1. cp configs/sagemaker-azure.yaml mem0-config.yaml
#   2. Uncomment the config volume mount in docker-compose.yml
#   3. docker compose up -d

version: "v1.1"

llm:
  provider: azure_openai
  config:
    model: gpt-5
    azure_deployment: gpt-5
    azure_endpoint: ${AZURE_OPENAI_ENDPOINT}
    api_key: ${AZURE_OPENAI_API_KEY}
    api_version: "2024-12-01-preview"
    temperature: 0.1

embedder:
  provider: sagemaker
  config:
    sagemaker_endpoint_name: tei-qwen-600m-staging  # or tei-qwen-600m-prod
    embedding_dims: 768
    aws_region: us-west-2
